<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor-Clinic Network</title>
<link rel="stylesheet" href="/static/css/styles.css">
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
</head>
<body>

<div id="topbar">
    <div class="nav-links">
        <a href="/" class="active">Doctors</a>
        <a href="/leads">Leads</a>
    </div>
    <h1>Doctor-Clinic Network</h1>
    <input type="text" id="search-box" placeholder="Search clinics or doctors..." autocomplete="off">
    <button class="topbar-btn" id="btn-clear">Clear</button>
    <label class="topbar-check">
        <input type="checkbox" id="chk-merge-nip"> Merge by NIP
    </label>
    <span id="stats">Loading...</span>
</div>

<div id="main">
    <div id="sidebar">
        <div class="panel" id="search-results" style="display:none">
            <h2>Search Results</h2>
            <div id="search-list"></div>
        </div>

        <div class="panel" id="spec-search-panel">
            <h2>Find Doctors by Specialization</h2>
            <div class="input-group">
                <label>From</label>
                <div class="tab-switch" id="ss-from-tabs">
                    <button class="tab-btn active" data-value="clinic">Clinic</button>
                    <button class="tab-btn" data-value="doctor">Doctor</button>
                </div>
                <input type="text" id="ss-from" placeholder="Search clinic..." autocomplete="off">
                <div class="autocomplete-list" id="ac-ss-from" style="display:none"></div>
            </div>
            <div class="input-group">
                <label>Target Specializations</label>
                <input type="text" id="ss-spec" placeholder="Type to search..." autocomplete="off">
                <div class="autocomplete-list" id="ac-ss-spec" style="display:none"></div>
            </div>
            <div class="selected-specs" id="ss-selected"></div>
            <div class="k-row">
                <label>Depth:</label>
                <select id="ss-hops">
                    <option value="3" selected>Up to 1 clinic away</option>
                    <option value="5">Up to 2 clinics away</option>
                    <option value="7">Up to 3 clinics away</option>
                </select>
            </div>
            <div style="display:flex;gap:6px">
                <button class="btn-action" id="btn-spec-search" disabled style="flex:1">Find Doctors</button>
                <button class="topbar-btn" id="btn-ss-clear">Clear</button>
            </div>
            <div id="spec-results" style="margin-top:8px"></div>
        </div>

        <div class="panel" id="pathfind-panel">
            <h2>Pathfinding</h2>
            <label id="pf-multi-label" style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);cursor:pointer;margin-bottom:8px">
                <input type="checkbox" id="pf-multi-mode" style="cursor:pointer;accent-color:var(--accent)"> Multiple start clinics
            </label>
            <div id="pf-single-from">
                <div class="input-group">
                    <label>From</label>
                    <div class="tab-switch" id="pf-from-tabs">
                        <button class="tab-btn active" data-value="clinic">Clinic</button>
                        <button class="tab-btn" data-value="doctor">Doctor</button>
                    </div>
                    <input type="text" id="pf-from" placeholder="Search clinic..." autocomplete="off">
                    <div class="autocomplete-list" id="ac-from" style="display:none"></div>
                </div>
            </div>
            <div id="pf-multi-container" style="display:none">
                <div class="input-group">
                    <label>From Clinics</label>
                    <input type="text" id="pf-multi-from" placeholder="Add start clinic..." autocomplete="off">
                    <div class="autocomplete-list" id="ac-pf-multi-from" style="display:none"></div>
                </div>
                <div class="selected-specs" id="pf-multi-selected"></div>
            </div>
            <div class="input-group">
                <label>To</label>
                <div class="tab-switch" id="pf-to-tabs">
                    <button class="tab-btn active" data-value="clinic">Clinic</button>
                    <button class="tab-btn" data-value="doctor">Doctor</button>
                </div>
                <input type="text" id="pf-to" placeholder="Search clinic..." autocomplete="off">
                <div class="autocomplete-list" id="ac-to" style="display:none"></div>
            </div>
            <div class="k-row">
                <label>Paths:</label>
                <select id="pf-k">
                    <option value="3">3</option>
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                </select>
            </div>
            <div style="display:flex;gap:6px">
                <button class="btn-action" id="btn-pathfind" disabled style="flex:1">Find Paths</button>
                <button class="topbar-btn" id="btn-pf-clear">Clear</button>
            </div>
            <div id="path-results" style="margin-top:8px"></div>
        </div>
    </div>

    <div id="cy"></div>

    <div id="right-panel">
        <div class="panel-header">
            <h2 style="font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em">Details</h2>
        </div>
        <div id="right-panel-content">
            <div class="placeholder-msg">
                <div class="icon">&#128269;</div>
                <div>Search for a clinic or doctor to view details</div>
                <div style="font-size:11px;color:var(--text-dim)">Click = details &middot; Double-click = expand</div>
            </div>
        </div>
    </div>
</div>

<div id="loading">Loading...</div>
<div id="tooltip"></div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
