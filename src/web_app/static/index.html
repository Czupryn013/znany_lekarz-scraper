<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor-Clinic Network</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
<style>
:root {
    --bg: #09090b;
    --bg-card: #0c0c0f;
    --bg-elevated: #131316;
    --bg-input: #18181b;
    --border: #27272a;
    --border-hover: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --accent-muted: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-muted: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --red: #ef4444;
    --purple: #a78bfa;
    --purple-muted: rgba(167,139,250,0.10);
    --radius: 8px;
    --radius-sm: 6px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; font-size: 13px; -webkit-font-smoothing: antialiased; }

/* Top bar */
#topbar {
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: var(--bg-card); border-bottom: 1px solid var(--border);
    flex-wrap: wrap; z-index: 50;
}
#topbar h1 { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; white-space: nowrap; }
#search-box {
    flex: 1; max-width: 360px; padding: 7px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg-input); color: var(--text); font-size: 13px;
    outline: none; transition: border-color 0.15s;
}
#search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-muted); }
#stats { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
.topbar-btn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg-input); color: var(--text-muted); font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.topbar-btn:hover { background: var(--bg-elevated); border-color: var(--border-hover); color: var(--text); }
.topbar-check { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
.topbar-check input { cursor: pointer; accent-color: var(--accent); }

/* Nav */
.nav-links { display: flex; gap: 2px; }
.nav-links a {
    padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
    text-decoration: none; color: var(--text-dim); transition: all 0.15s;
}
.nav-links a.active { background: var(--accent); color: white; }
.nav-links a:hover:not(.active) { background: var(--bg-elevated); color: var(--text); }

/* Main layout */
#main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
#sidebar {
    width: 370px; min-width: 370px; background: var(--bg-card);
    border-right: 1px solid var(--border); overflow-y: auto;
    display: flex; flex-direction: column;
}
.panel { padding: 14px; border-bottom: 1px solid var(--border); }
.panel h2 {
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em;
}
.panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }

/* Search results */
.search-item {
    padding: 6px 8px; cursor: pointer; border-radius: var(--radius-sm);
    font-size: 13px; display: flex; align-items: center; gap: 6px; transition: background 0.1s;
}
.search-item:hover { background: var(--bg-elevated); }
.badge {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
}
.badge-clinic { background: var(--accent-muted); color: var(--accent); }
.badge-doctor { background: var(--green-muted); color: var(--green); }

/* Node details */
#node-details { display: none; }
.detail-row { font-size: 13px; margin-bottom: 4px; }
.detail-label { color: var(--text-dim); }
.spec-tag {
    display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 20px;
    font-size: 11px; background: var(--purple-muted); color: var(--purple); font-weight: 500;
}
.spec-tag.in-progress {
    background: rgba(234,179,8,0.1); color: var(--yellow);
    border: 1px dashed rgba(234,179,8,0.3);
}

/* Reviews */
.reviews-bar {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
    padding: 8px 10px; background: var(--bg-input); border-radius: var(--radius-sm);
    border: 1px solid var(--border);
}
.reviews-bar .bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; display: flex; }
.reviews-bar .bar-pos { background: var(--green); }
.reviews-bar .bar-neu { background: var(--yellow); }
.reviews-bar .bar-neg { background: var(--red); }
.reviews-nums { font-size: 11px; color: var(--text-dim); display: flex; gap: 10px; margin-top: 4px; }

/* Booking */
.booking-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 8px; margin-top: 3px;
    background: var(--bg-input); border-radius: var(--radius-sm); font-size: 12px;
    border: 1px solid var(--border);
}
.booking-bar { width: 50px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
.booking-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }

/* Inputs in panels */
.panel input, .panel select {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--bg-input); color: var(--text);
    font-size: 13px; outline: none; transition: border-color 0.15s;
}
.panel input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-muted); }
.panel label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; font-weight: 500; }
.input-group { position: relative; margin-bottom: 8px; }
.autocomplete-list {
    position: absolute; background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius-sm); max-height: 160px; overflow-y: auto;
    z-index: 10; width: calc(100% - 0px); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.autocomplete-item { padding: 7px 10px; cursor: pointer; font-size: 13px; transition: background 0.1s; }
.autocomplete-item:hover { background: var(--bg-input); }

/* Buttons */
.btn-action {
    width: 100%; padding: 8px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm); font-weight: 600;
    cursor: pointer; font-size: 13px; transition: background 0.15s;
}
.btn-action:hover { background: var(--accent-hover); }
.btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

/* Selected spec tags */
.selected-specs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; min-height: 20px; }
.selected-spec {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
    background: var(--purple-muted); color: var(--purple);
}
.selected-spec .remove-spec { cursor: pointer; color: var(--red); opacity: 0.7; font-weight: bold; margin-left: 2px; }
.selected-spec .remove-spec:hover { opacity: 1; }

/* Spec search results */
.spec-result-item {
    padding: 7px 8px; border-radius: var(--radius-sm); font-size: 12px;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    transition: background 0.1s;
}
.spec-result-item:hover { background: var(--bg-elevated); }
.spec-result-item .hops {
    font-size: 10px; color: var(--text-dim); background: var(--bg-input);
    padding: 1px 6px; border-radius: 10px; border: 1px solid var(--border);
}

/* Path results */
.path-item {
    padding: 8px; margin-bottom: 4px; border-radius: var(--radius-sm);
    background: var(--bg-input); cursor: pointer; font-size: 12px;
    border: 1px solid var(--border); transition: border-color 0.15s;
}
.path-item:hover { border-color: var(--border-hover); }
.path-item.active { border-left: 3px solid var(--yellow); }
.path-node { display: inline-block; padding: 1px 6px; margin: 1px; border-radius: 4px; font-size: 11px; }
.path-node-clinic { background: var(--accent-muted); color: var(--accent); }
.path-node-doctor { background: var(--green-muted); color: var(--green); }
.path-arrow { color: var(--text-dim); margin: 0 2px; font-size: 10px; }

/* K / hops selector */
.k-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.k-row label { flex-shrink: 0; margin-bottom: 0; }
.k-row select { flex: 1; }

/* Graph canvas */
#cy { flex: 1; background: var(--bg); position: relative; }

/* Loading */
#loading {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%); background: var(--bg-elevated);
    padding: 16px 28px; border-radius: var(--radius); border: 1px solid var(--border);
    z-index: 100; font-size: 13px; color: var(--text-muted);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

/* Tooltip */
#tooltip {
    display: none; position: fixed; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; font-size: 12px; z-index: 200; pointer-events: none;
    max-width: 380px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
#tooltip .tt-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; letter-spacing: -0.01em; }
#tooltip .tt-type { color: var(--text-dim); font-size: 11px; }
#tooltip .tt-specs { margin-top: 5px; }
#tooltip .tt-specs span {
    display: inline-block; padding: 1px 7px; margin: 1px; border-radius: 10px;
    font-size: 10px; background: var(--purple-muted); color: var(--purple); font-weight: 500;
}
#tooltip .tt-locations { color: var(--yellow); font-size: 11px; margin-top: 3px; }
#tooltip .tt-photo { display: flex; gap: 10px; align-items: flex-start; }
#tooltip .tt-photo img {
    width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--border); flex-shrink: 0;
}
#tooltip .tt-gender { font-size: 11px; color: var(--text-dim); }

/* Doctor detail header */
.doc-header { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.doc-header img {
    width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--border);
}
.doc-header-info { flex: 1; }
</style>
</head>
<body>

<div id="topbar">
    <div class="nav-links">
        <a href="/" class="active">Doctors</a>
        <a href="/leads">Leads</a>
    </div>
    <h1>Doctor-Clinic Network</h1>
    <input type="text" id="search-box" placeholder="Search clinics or doctors..." autocomplete="off">
    <button class="topbar-btn" id="btn-clear">Clear</button>
    <label class="topbar-check">
        <input type="checkbox" id="chk-merge-nip"> Merge by NIP
    </label>
    <span id="stats">Loading...</span>
</div>

<div id="main">
    <div id="sidebar">
        <div class="panel" id="search-results" style="display:none">
            <h2>Search Results</h2>
            <div id="search-list"></div>
        </div>

        <div class="panel" id="node-details">
            <h2>Node Details</h2>
            <div id="detail-content"></div>
        </div>

        <div class="panel" id="spec-search-panel">
            <h2>Find Doctors by Specialization</h2>
            <div class="input-group">
                <label>From Clinic</label>
                <input type="text" id="ss-clinic" placeholder="Search clinic..." autocomplete="off">
                <div class="autocomplete-list" id="ac-ss-clinic" style="display:none"></div>
            </div>
            <div class="input-group">
                <label>Target Specializations</label>
                <input type="text" id="ss-spec" placeholder="Type to search..." autocomplete="off">
                <div class="autocomplete-list" id="ac-ss-spec" style="display:none"></div>
            </div>
            <div class="selected-specs" id="ss-selected"></div>
            <div class="k-row">
                <label>Depth:</label>
                <select id="ss-hops">
                    <option value="3" selected>Up to 1 clinic away</option>
                    <option value="5">Up to 2 clinics away</option>
                    <option value="7">Up to 3 clinics away</option>
                </select>
            </div>
            <button class="btn-action" id="btn-spec-search" disabled>Find Doctors</button>
            <div id="spec-results" style="margin-top:8px"></div>
        </div>

        <div class="panel" id="pathfind-panel">
            <h2>Pathfinding</h2>
            <div class="input-group">
                <label>From Clinic</label>
                <input type="text" id="pf-from" placeholder="Search clinic..." autocomplete="off">
                <div class="autocomplete-list" id="ac-from" style="display:none"></div>
            </div>
            <div class="input-group">
                <label>To Clinic</label>
                <input type="text" id="pf-to" placeholder="Search clinic..." autocomplete="off">
                <div class="autocomplete-list" id="ac-to" style="display:none"></div>
            </div>
            <div class="k-row">
                <label>Paths:</label>
                <select id="pf-k">
                    <option value="3">3</option>
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                </select>
            </div>
            <button class="btn-action" id="btn-pathfind" disabled>Find Paths</button>
            <div id="path-results" style="margin-top:8px"></div>
        </div>
    </div>

    <div id="cy"></div>
</div>

<div id="loading">Loading...</div>
<div id="tooltip"></div>

<script>
const API = '/api';
let cy, fromClinicId = null, toClinicId = null, currentPaths = [];
const PATH_COLORS = ['#f59e0b','#ef4444','#22c55e','#3b82f6','#ec4899','#8b5cf6','#06b6d4','#84cc16','#f97316','#6366f1'];

function isMergeNip() { return document.getElementById('chk-merge-nip').checked; }
function mergeParam() { return isMergeNip() ? '&merge_nip=true' : ''; }
function mergeParamFirst() { return isMergeNip() ? '?merge_nip=true' : ''; }
function genderLabel(g) { return g === 1 ? 'Male' : g === 0 ? 'Female' : null; }
function genderIcon(g) { return g === 1 ? '\u2642' : g === 0 ? '\u2640' : ''; }

function initCy() {
    cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
            { selector: 'node[type="clinic"]', style: {
                'shape': 'round-rectangle', 'background-color': '#1e3a5f',
                'label': 'data(short_label)', 'color': '#a1a1aa', 'font-size': '10px',
                'font-family': 'Inter, system-ui, sans-serif',
                'text-valign': 'bottom', 'text-margin-y': 5,
                'width': 'mapData(doctors_count, 1, 50, 24, 56)',
                'height': 'mapData(doctors_count, 1, 50, 24, 56)',
                'border-width': 1, 'border-color': '#3b82f6', 'border-opacity': 0.5,
                'text-max-width': '100px', 'text-wrap': 'ellipsis',
            }},
            { selector: 'node[type="doctor"]', style: {
                'shape': 'ellipse', 'background-color': '#14532d',
                'label': 'data(short_label)', 'color': '#a1a1aa', 'font-size': '9px',
                'font-family': 'Inter, system-ui, sans-serif',
                'text-valign': 'bottom', 'text-margin-y': 4,
                'width': 18, 'height': 18,
                'border-width': 1, 'border-color': '#22c55e', 'border-opacity': 0.4,
                'text-max-width': '80px', 'text-wrap': 'ellipsis',
            }},
            { selector: 'node[type="doctor"][?has_img]', style: {
                'background-image': 'data(img_url)', 'background-fit': 'cover',
                'background-clip': 'node', 'width': 26, 'height': 26,
            }},
            { selector: 'node.spec-match', style: {
                'border-color': '#eab308', 'border-width': 2.5, 'border-opacity': 1,
            }},
            { selector: 'edge', style: {
                'line-color': '#27272a', 'width': 1, 'curve-style': 'bezier', 'opacity': 0.6,
            }},
            { selector: 'edge[booking_ratio]', style: {
                'line-color': 'mapData(booking_ratio, 0, 1, #27272a, #3b82f6)',
                'width': 'mapData(booking_ratio, 0, 1, 1, 2.5)',
            }},
            { selector: 'node:selected', style: { 'border-color': '#eab308', 'border-width': 2.5, 'border-opacity': 1 }},
            { selector: '.path-highlight', style: { 'opacity': 1, 'z-index': 10 }},
            { selector: '.dimmed', style: { 'opacity': 0.12 }},
        ],
        layout: { name: 'preset' },
        minZoom: 0.1, maxZoom: 5,
    });

    cy.on('tap', 'node', async (e) => {
        await loadNodeDetails(e.target.data('type'), e.target.data('raw_id'));
    });
    cy.on('dbltap', 'node', async (e) => {
        await loadNeighborhood(e.target.data('type'), e.target.data('raw_id'), 2);
    });

    const tooltip = document.getElementById('tooltip');

    cy.on('mouseover', 'node', (e) => {
        const node = e.target;
        const label = node.data('label'), type = node.data('type');
        const specs = node.data('specializations'), locCount = node.data('locations_count');
        const gender = node.data('gender'), imgUrl = node.data('img_url');

        let html = '';
        if (type === 'doctor' && imgUrl) {
            html += `<div class="tt-photo"><img src="${esc(imgUrl)}" onerror="this.style.display='none'"><div>`;
        }
        html += `<div class="tt-name" style="color:${type === 'clinic' ? 'var(--accent)' : 'var(--green)'}">${esc(label)}</div>`;
        html += `<div class="tt-type">${type === 'clinic' ? 'Clinic' : 'Doctor'}`;
        if (type === 'clinic') {
            const dc = node.data('doctors_count');
            if (dc) html += ` &middot; ${dc} doctors`;
        }
        if (type === 'doctor' && gender !== null && gender !== undefined) {
            html += ` &middot; <span class="tt-gender">${genderIcon(gender)} ${genderLabel(gender)}</span>`;
        }
        html += '</div>';
        if (locCount && locCount > 1) html += `<div class="tt-locations">${locCount} locations (merged)</div>`;
        if (specs) {
            html += '<div class="tt-specs">';
            for (const s of specs.split(', ').filter(Boolean)) html += `<span>${esc(s)}</span>`;
            html += '</div>';
        }
        if (type === 'doctor' && imgUrl) html += '</div></div>';
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
    });
    cy.on('mousemove', 'node', (e) => {
        tooltip.style.left = (e.originalEvent.clientX + 14) + 'px';
        tooltip.style.top = (e.originalEvent.clientY + 14) + 'px';
    });
    cy.on('mouseout', 'node', () => { tooltip.style.display = 'none'; });

    cy.on('mouseover', 'edge', (e) => {
        const br = e.target.data('booking_ratio');
        if (br == null) return;
        tooltip.innerHTML = `<div style="font-size:12px">Booking ratio: <b>${(br * 100).toFixed(0)}%</b></div>`;
        tooltip.style.display = 'block';
    });
    cy.on('mousemove', 'edge', (e) => {
        tooltip.style.left = (e.originalEvent.clientX + 14) + 'px';
        tooltip.style.top = (e.originalEvent.clientY + 14) + 'px';
    });
    cy.on('mouseout', 'edge', () => { tooltip.style.display = 'none'; });
}

async function apiFetch(path) { return (await fetch(`${API}${path}`)).json(); }

// ── Search ──
let searchTimeout;
const searchBox = document.getElementById('search-box');
const searchResults = document.getElementById('search-results');
const searchList = document.getElementById('search-list');

searchBox.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchBox.value.trim();
    if (q.length < 2) { searchResults.style.display = 'none'; return; }
    searchTimeout = setTimeout(() => doSearch(q), 300);
});

async function doSearch(q) {
    const data = await apiFetch(`/search?q=${encodeURIComponent(q)}`);
    searchList.innerHTML = '';
    searchResults.style.display = 'block';
    for (const c of data.clinics) {
        const el = document.createElement('div');
        el.className = 'search-item';
        el.innerHTML = `<span class="badge badge-clinic">C</span> ${esc(c.name)}`;
        el.onclick = () => loadNeighborhood('clinic', c.id, 1);
        searchList.appendChild(el);
    }
    for (const d of data.doctors) {
        const el = document.createElement('div');
        el.className = 'search-item';
        el.innerHTML = `<span class="badge badge-doctor">D</span> ${esc(d.name)} ${esc(d.surname)}`;
        el.onclick = () => loadNeighborhood('doctor', d.id, 1);
        searchList.appendChild(el);
    }
    if (!data.clinics.length && !data.doctors.length)
        searchList.innerHTML = '<div style="padding:8px;color:var(--text-dim);font-size:13px">No results</div>';
}

async function loadNeighborhood(type, id, depth) {
    showLoading(true);
    const data = await apiFetch(`/neighbors/${type}/${id}?depth=${depth}${mergeParam()}`);
    addToGraph(data.nodes, data.edges);
    showLoading(false);
}

async function loadNodeDetails(type, rawId) {
    const data = await apiFetch(`/node/${type}/${rawId}${mergeParamFirst()}`);
    if (data.error) return;
    const det = data.details;
    const panel = document.getElementById('node-details');
    const content = document.getElementById('detail-content');
    panel.style.display = 'block';

    let html = '';
    if (type === 'clinic') {
        html += `<h3 style="color:var(--accent)">${esc(det.name || 'Unknown')}</h3>`;
        if (det.doctors_count) html += `<div class="detail-row"><span class="detail-label">Doctors:</span> ${det.doctors_count}</div>`;
        if (det.legal_name) html += `<div class="detail-row"><span class="detail-label">Legal:</span> ${esc(det.legal_name)}</div>`;
        if (det.nip) html += `<div class="detail-row"><span class="detail-label">NIP:</span> ${det.nip}</div>`;
        if (det.website_domain) html += `<div class="detail-row"><span class="detail-label">Website:</span> ${esc(det.website_domain)}</div>`;
        if (det.zl_url) html += `<div class="detail-row"><a href="${esc(det.zl_url)}" target="_blank" style="color:var(--accent);font-size:12px">ZnanyLekarz profile</a></div>`;
        if (det.locations && det.locations.length) {
            html += '<div class="detail-row" style="margin-top:6px"><span class="detail-label">Locations:</span></div>';
            for (const loc of det.locations) if (loc.address) html += `<div class="detail-row" style="padding-left:8px;font-size:12px;color:var(--text-muted)">${esc(loc.address)}</div>`;
        }
        if (det.specializations && det.specializations.length) {
            html += '<div style="margin-top:6px">';
            for (const s of det.specializations) html += `<span class="spec-tag">${esc(s)}</span>`;
            html += '</div>';
        }
    } else {
        html += '<div class="doc-header">';
        if (det.img_url) html += `<img src="${esc(det.img_url)}" onerror="this.style.display='none'">`;
        html += '<div class="doc-header-info">';
        html += `<h3 style="color:var(--green)">${esc(det.name || '')} ${esc(det.surname || '')}</h3>`;
        if (det.gender != null) html += `<div style="font-size:12px;color:var(--text-dim)">${genderIcon(det.gender)} ${genderLabel(det.gender)}</div>`;
        html += '</div></div>';
        if (det.zl_url) html += `<div class="detail-row"><a href="${esc(det.zl_url)}" target="_blank" style="color:var(--accent);font-size:12px">ZnanyLekarz profile</a></div>`;

        if (det.specializations && det.specializations.length) {
            html += '<div style="margin-top:8px">';
            for (const s of det.specializations) {
                const cls = s.is_in_progress ? 'spec-tag in-progress' : 'spec-tag';
                html += `<span class="${cls}">${esc(s.name)}${s.is_in_progress ? ' (w trakcie)' : ''}</span>`;
            }
            html += '</div>';
        }

        const pos = det.opinions_positive || 0, neu = det.opinions_neutral || 0, neg = det.opinions_negative || 0;
        const total = pos + neu + neg;
        if (total > 0) {
            const pP = (pos/total*100).toFixed(0), nP = (neu/total*100).toFixed(0), gP = (neg/total*100).toFixed(0);
            html += `<div style="margin-top:10px"><span class="detail-label">Reviews (${total})</span></div>`;
            html += `<div class="reviews-bar"><div class="bar"><div class="bar-pos" style="width:${pP}%"></div><div class="bar-neu" style="width:${nP}%"></div><div class="bar-neg" style="width:${gP}%"></div></div></div>`;
            html += `<div class="reviews-nums"><span style="color:var(--green)">+${pos}</span><span style="color:var(--yellow)">~${neu}</span><span style="color:var(--red)">-${neg}</span></div>`;
        }

        if (det.clinic_bookings && det.clinic_bookings.length) {
            html += '<div style="margin-top:10px"><span class="detail-label">Booking per clinic</span></div>';
            for (const cb of det.clinic_bookings) {
                const pct = cb.booking_ratio != null ? (cb.booking_ratio * 100).toFixed(0) : '?';
                const fw = cb.booking_ratio != null ? (cb.booking_ratio * 100) : 0;
                html += `<div class="booking-row"><div class="booking-bar"><div class="booking-bar-fill" style="width:${fw}%"></div></div>`;
                html += `<span style="color:var(--accent);min-width:28px">${pct}%</span>`;
                html += `<span style="flex:1;color:var(--text-muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(cb.clinic_name)}</span>`;
                if (cb.is_bookable) html += '<span style="color:var(--green);font-size:10px">bookable</span>';
                html += '</div>';
            }
        }
    }
    content.innerHTML = html;
    addToGraph(data.neighborhood.nodes, data.neighborhood.edges);
}

// ── Graph ──
function truncateLabel(s, max) { return !s ? '' : s.length > max ? s.substring(0, max) + '\u2026' : s; }

function addToGraph(nodes, edges) {
    const elements = [];
    for (const n of nodes) {
        if (!cy.getElementById(n.id).length) {
            const d = {
                id: n.id, label: n.label || n.id, short_label: truncateLabel(n.label || n.id, 22),
                type: n.type, raw_id: n.raw_id, doctors_count: n.doctors_count || 1,
                specializations: (n.specializations || []).join(', '), locations_count: n.locations_count || 0,
            };
            if (n.type === 'doctor') {
                d.gender = n.gender;
                if (n.img_url) { d.img_url = n.img_url; d.has_img = true; }
            }
            elements.push({ group: 'nodes', data: d });
        }
    }
    for (const e of edges) {
        const pair = [e.source, e.target].sort();
        const edgeId = `${pair[0]}-${pair[1]}`;
        if (!cy.getElementById(edgeId).length) {
            const d = { id: edgeId, source: e.source, target: e.target };
            if (e.booking_ratio != null) d.booking_ratio = e.booking_ratio;
            elements.push({ group: 'edges', data: d });
        }
    }
    if (elements.length) {
        cy.add(elements);
        cy.layout({
            name: 'cose-bilkent', animate: true, animationDuration: 600,
            nodeRepulsion: 25000, idealEdgeLength: 140, edgeElasticity: 0.05,
            gravity: 0.08, gravityRange: 1.5, numIter: 2500, tile: true, fit: true, padding: 50,
            nestingFactor: 0.1, tilingPaddingVertical: 20, tilingPaddingHorizontal: 20,
        }).run();
    }
}

function clearGraph() { cy.elements().remove(); }

function resetAll() {
    clearGraph(); currentPaths = []; fromClinicId = null; toClinicId = null;
    document.getElementById('pf-from').value = '';
    document.getElementById('pf-to').value = '';
    document.getElementById('path-results').innerHTML = '';
    document.getElementById('node-details').style.display = 'none';
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-box').value = '';
    document.getElementById('btn-pathfind').disabled = true;
    document.getElementById('spec-results').innerHTML = '';
}

document.getElementById('btn-clear').addEventListener('click', resetAll);
document.getElementById('chk-merge-nip').addEventListener('change', () => { resetAll(); loadStats(); });

// ── Clinic autocomplete helper ──
function setupClinicAutocomplete(input, dropdown, onSelect) {
    let t;
    input.addEventListener('input', () => {
        clearTimeout(t);
        const q = input.value.trim();
        if (q.length < 2) { dropdown.style.display = 'none'; return; }
        t = setTimeout(async () => {
            const data = await apiFetch(`/search?q=${encodeURIComponent(q)}`);
            dropdown.innerHTML = '';
            for (const c of data.clinics) {
                const el = document.createElement('div');
                el.className = 'autocomplete-item';
                el.textContent = c.name;
                el.onclick = () => { input.value = c.name; dropdown.style.display = 'none'; onSelect(c.id); };
                dropdown.appendChild(el);
            }
            dropdown.style.display = data.clinics.length ? 'block' : 'none';
        }, 300);
    });
    input.addEventListener('blur', () => setTimeout(() => dropdown.style.display = 'none', 200));
}

// ── Pathfinding ──
setupClinicAutocomplete(document.getElementById('pf-from'), document.getElementById('ac-from'), (id) => { fromClinicId = id; updatePfBtn(); });
setupClinicAutocomplete(document.getElementById('pf-to'), document.getElementById('ac-to'), (id) => { toClinicId = id; updatePfBtn(); });
function updatePfBtn() { document.getElementById('btn-pathfind').disabled = !(fromClinicId && toClinicId); }

document.getElementById('btn-pathfind').addEventListener('click', async () => {
    if (!fromClinicId || !toClinicId) return;
    const btn = document.getElementById('btn-pathfind');
    const pr = document.getElementById('path-results');
    btn.disabled = true; btn.textContent = 'Searching...';
    const data = await apiFetch(`/pathfind?from_clinic=${fromClinicId}&to_clinic=${toClinicId}&k=${document.getElementById('pf-k').value}${mergeParam()}`);
    btn.disabled = false; btn.textContent = 'Find Paths';
    currentPaths = data.paths || [];

    if (data.error) { pr.innerHTML = `<div style="color:var(--red);font-size:13px;padding:8px">${esc(data.error)}</div>`; return; }
    if (!currentPaths.length) { pr.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px">No paths found.</div>'; return; }

    clearGraph();
    const allN = [], allE = [], seen = new Set();
    for (const path of currentPaths) {
        for (let i = 0; i < path.length; i++) {
            const n = path[i];
            if (!seen.has(n.id)) { seen.add(n.id); allN.push({ id: n.id, type: n.type, raw_id: n.raw_id, label: n.label, doctors_count: 1, specializations: n.specializations || [] }); }
            if (i < path.length - 1) allE.push({ source: n.id, target: path[i+1].id });
        }
    }
    addToGraph(allN, allE);

    pr.innerHTML = `<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">${currentPaths.length} path(s)</div>`;
    currentPaths.forEach((path, idx) => {
        const el = document.createElement('div');
        el.className = 'path-item';
        el.style.borderLeft = `3px solid ${PATH_COLORS[idx % PATH_COLORS.length]}`;
        el.innerHTML = `<div style="font-size:11px;color:var(--text-dim);margin-bottom:3px">Path ${idx+1} &middot; ${Math.floor(path.length/2)} hops</div>`
            + path.map(n => `<span class="path-node path-node-${n.type}">${esc(n.label)}</span>`).join('<span class="path-arrow">\u2192</span>');
        el.onclick = () => highlightPath(idx);
        pr.appendChild(el);
    });
    highlightPath(0);
});

function highlightPath(idx) {
    cy.elements().removeClass('path-highlight dimmed');
    document.querySelectorAll('.path-item').forEach(el => el.classList.remove('active'));
    if (idx < 0 || idx >= currentPaths.length) return;
    const path = currentPaths[idx], color = PATH_COLORS[idx % PATH_COLORS.length];
    cy.elements().addClass('dimmed');
    for (let i = 0; i < path.length; i++) {
        const node = cy.getElementById(path[i].id);
        node.removeClass('dimmed').addClass('path-highlight').style('border-color', color).style('border-width', 2.5);
        if (i < path.length - 1) {
            const pair = [path[i].id, path[i+1].id].sort();
            const edge = cy.getElementById(`${pair[0]}-${pair[1]}`);
            if (edge.length) edge.removeClass('dimmed').addClass('path-highlight').style('line-color', color).style('width', 2.5);
        }
    }
    const items = document.querySelectorAll('.path-item');
    if (items[idx]) items[idx].classList.add('active');
}

// ── Specialization Search ──
let ssClinicId = null;
const ssSelectedSpecs = [];
setupClinicAutocomplete(document.getElementById('ss-clinic'), document.getElementById('ac-ss-clinic'), (id) => { ssClinicId = id; updateSsBtn(); });

let specTimeout;
const ssSpecInput = document.getElementById('ss-spec');
const acSsSpec = document.getElementById('ac-ss-spec');

ssSpecInput.addEventListener('input', () => {
    clearTimeout(specTimeout);
    const q = ssSpecInput.value.trim();
    if (q.length < 2) { acSsSpec.style.display = 'none'; return; }
    specTimeout = setTimeout(async () => {
        const data = await apiFetch(`/search-specializations?q=${encodeURIComponent(q)}`);
        acSsSpec.innerHTML = '';
        const already = new Set(ssSelectedSpecs.map(s => s.id));
        for (const s of data) {
            if (already.has(s.id)) continue;
            const el = document.createElement('div');
            el.className = 'autocomplete-item';
            el.innerHTML = `${esc(s.name)} <span style="color:var(--text-dim);font-size:11px">${s.doctor_count} doctors</span>`;
            el.onclick = () => {
                ssSelectedSpecs.push({ id: s.id, name: s.name });
                ssSpecInput.value = ''; acSsSpec.style.display = 'none';
                renderSelectedSpecs(); updateSsBtn();
            };
            acSsSpec.appendChild(el);
        }
        acSsSpec.style.display = data.length ? 'block' : 'none';
    }, 300);
});
ssSpecInput.addEventListener('blur', () => setTimeout(() => acSsSpec.style.display = 'none', 200));

function renderSelectedSpecs() {
    const el = document.getElementById('ss-selected');
    el.innerHTML = '';
    for (const s of ssSelectedSpecs) {
        const tag = document.createElement('span');
        tag.className = 'selected-spec';
        tag.innerHTML = `${esc(s.name)} <span class="remove-spec">\u00d7</span>`;
        tag.querySelector('.remove-spec').onclick = () => {
            const i = ssSelectedSpecs.findIndex(x => x.id === s.id);
            if (i >= 0) ssSelectedSpecs.splice(i, 1);
            renderSelectedSpecs(); updateSsBtn();
        };
        el.appendChild(tag);
    }
}

function updateSsBtn() { document.getElementById('btn-spec-search').disabled = !(ssClinicId && ssSelectedSpecs.length); }

document.getElementById('btn-spec-search').addEventListener('click', async () => {
    if (!ssClinicId || !ssSelectedSpecs.length) return;
    const btn = document.getElementById('btn-spec-search');
    btn.disabled = true; btn.textContent = 'Searching...';

    const hops = document.getElementById('ss-hops').value;
    const specIds = ssSelectedSpecs.map(s => s.id).join(',');
    const data = await apiFetch(`/find-by-specialization?from_clinic=${ssClinicId}&spec_ids=${specIds}&hops=${hops}${mergeParam()}`);
    btn.disabled = false; btn.textContent = 'Find Doctors';

    const sr = document.getElementById('spec-results');
    if (data.error) { sr.innerHTML = `<div style="color:var(--red);font-size:13px;padding:8px">${esc(data.error)}</div>`; return; }

    clearGraph();
    addToGraph(data.nodes, data.edges);

    const matchedIds = new Set(data.results.map(r => `d_${r.doctor_id}`));
    cy.nodes().forEach(n => { if (matchedIds.has(n.id())) n.addClass('spec-match'); });

    if (!data.results.length) { sr.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px">No doctors found in range.</div>'; return; }

    let html = `<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">${data.total_found} doctor(s) found</div>`;
    for (const r of data.results) {
        const dn = data.nodes.find(n => n.raw_id === r.doctor_id && n.type === 'doctor');
        const label = dn ? dn.label : `Doctor ${r.doctor_id}`;
        const clinicsAway = Math.floor((r.hops - 1) / 2);
        const distLabel = clinicsAway === 0 ? 'direct' : `${clinicsAway} clinic${clinicsAway > 1 ? 's' : ''} away`;
        html += `<div class="spec-result-item" data-id="d_${r.doctor_id}">`;
        html += `<span><span class="badge badge-doctor">D</span> ${esc(label)} <span style="color:var(--purple);font-size:11px">${esc((r.matching_specs||[]).join(', '))}</span></span>`;
        html += `<span class="hops">${distLabel}</span>`;
        html += '</div>';
    }
    sr.innerHTML = html;
    sr.querySelectorAll('.spec-result-item').forEach(el => {
        el.onclick = () => {
            const n = cy.getElementById(el.dataset.id);
            if (n.length) { cy.animate({ center: { eles: n }, zoom: 2 }, { duration: 300 }); n.select(); loadNodeDetails('doctor', parseInt(el.dataset.id.split('_')[1])); }
        };
    });
});

// ── Stats ──
async function loadStats() {
    const data = await apiFetch(`/stats${mergeParamFirst()}`);
    const specInfo = data.doctors_with_specs ? ` \u00b7 ${data.doctors_with_specs.toLocaleString()} with specs` : '';
    document.getElementById('stats').textContent =
        `${data.clinics.toLocaleString()} clinics \u00b7 ${data.doctors.toLocaleString()} doctors \u00b7 ${data.edges.toLocaleString()} edges${specInfo}`;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }

document.addEventListener('DOMContentLoaded', () => { initCy(); loadStats(); });
</script>
